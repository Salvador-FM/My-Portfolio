<nav class="fixed top-0 left-0 right-0 z-50 shadow-md bg-white dark:bg-gray-base">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <a href="/" class="shrink-0 hover:opacity-80 transition-opacity">
        <img ngSrc="/icon.png" alt="Logo" width="32" height="32" priority>
      </a>

      <!-- Dark Mode Toggle (Mobile only) -->
      <div class="md:hidden ml-auto mr-2 flex gap-1">
        <p-button width="40" height="40" class="p-0" (click)="toggleMode()">
          <lucide-angular [img]="SunMoonIcon" class="my-icon"></lucide-angular>
        </p-button>
        <p-button width="40" height="40" class="p-0" (click)="toggleLanguage()">
          {{ nextLang() }}
        </p-button>
      </div>

      <!-- Menu Toggle Button (Mobile) -->
      <button 
        class="md:hidden flex flex-col gap-1.5 bg-transparent border-0 cursor-pointer p-2"
        [attr.aria-expanded]="isMenuOpen()"
        (click)="toggleMenu()"
        aria-label="Toggle navigation menu">
        <span class="block w-6 h-0.5 bg-green-600 transition-all" [class.rotate-45]="isMenuOpen()" [class.translate-y-2]="isMenuOpen()"></span>
        <span class="block w-6 h-0.5 bg-green-600 transition-all" [class.opacity-0]="isMenuOpen()"></span>
        <span class="block w-6 h-0.5 bg-green-600 transition-all" [class.-rotate-45]="isMenuOpen()" [class.-translate-y-2]="isMenuOpen()"></span>
      </button>

      <!-- Navigation Links -->
      <ul class="hidden md:flex list-none gap-8 m-0 p-0 items-center">
        <li><a [routerLink]="['/']" fragment="profile" class="text-green-600 no-underline transition-colors hover:text-neon-green focus:outline-2 focus:outline-offset-2 focus:outline-neon-green">{{ t('navbar.profile') }}</a></li>
        <li><a [routerLink]="['/']" fragment="skills" class="text-green-600 no-underline transition-colors hover:text-neon-green focus:outline-2 focus:outline-offset-2 focus:outline-neon-green">{{ t('navbar.skills') }}</a></li>
        <li><a [routerLink]="['/']" fragment="projects" class="text-green-600 no-underline transition-colors hover:text-neon-green focus:outline-2 focus:outline-offset-2 focus:outline-neon-green">{{ t('navbar.projects') }}</a></li>
        <li><a [routerLink]="['/contact']" class="text-green-600 no-underline transition-colors hover:text-neon-green focus:outline-2 focus:outline-offset-2 focus:outline-neon-green">{{ t('navbar.contact') }}</a></li>
        <li class="flex items-center ml-4 gap-2">
          <p-button class="p-0 scale-85" (click)="toggleMode()">
            <lucide-angular [img]="SunMoonIcon" color="green" class="my-icon"></lucide-angular>
          </p-button>
          <p-button class="p-0 scale-85 bg-transparent border-0 text-green-600 hover:text-neon-green" (click)="toggleLanguage()">
            {{ nextLang() }}
          </p-button>
        </li>
      </ul>
    </div>

    <!-- Mobile Menu (overlay) -->
    <div
      class="md:hidden absolute left-0 right-0 top-full bg-white-400 dark:bg-gray-base shadow-lg origin-top transform transition-transform duration-200"
      [class.scale-y-0]="!isMenuOpen()"
      [class.scale-y-100]="isMenuOpen()"
      style="transform-origin: top;">
      <ul class="list-none flex flex-col m-0 p-0">
        <li class="border-b border-green-500"><a [routerLink]="['/']" fragment="profile" class="block px-4 py-3 text-green-600 no-underline hover:bg-gray-100 transition-colors">{{ t('navbar.profile') }}</a></li>
        <li class="border-b border-green-500"><a [routerLink]="['/']" fragment="skills" class="block px-4 py-3 text-green-600 no-underline hover:bg-gray-100 transition-colors">{{ t('navbar.skills') }}</a></li>
        <li class="border-b border-green-500"><a [routerLink]="['/']" fragment="projects" class="block px-4 py-3 text-green-600 no-underline hover:bg-gray-100 transition-colors">{{ t('navbar.projects') }}</a></li>
        <li class="border-b border-green-500"><a [routerLink]="['/contact']" class="block px-4 py-3 text-green-600 no-underline hover:bg-gray-100 transition-colors">{{ t('navbar.contact') }}</a></li>
      </ul>
    </div>
  </div>
</nav>
